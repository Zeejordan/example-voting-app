apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: voting-dev
  labels:
    app: redis
  
spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: redis
  
  template:
    metadata:
      labels:
        app: redis
      
    spec: 
      containers:
        - name: redis
          image: redis:7-alpine

          ports:
            - containerPort: 6379
          
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi" 

          readinessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 15
            periodSeconds: 10 
      
        

    