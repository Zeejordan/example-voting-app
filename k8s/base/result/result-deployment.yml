apiVersion: apps/v1
kind: Deployment

metadata:
  name: result
  namespace: voting-dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: result

  template:
    metadata:
      labels:
        app: result

    spec:
      containers:
        - name: result

          image: zeeshankhan001/result:latest

          ports:
            - containerPort: 4000

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: postgres-secret
          
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"
          
          readinessProbe:
            httpGet:
              path: /health
              port: 4000

            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 4000

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3