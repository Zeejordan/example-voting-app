apiVersion: apps/v1
kind: Deployment

metadata:
  name: result
  namespace: voting-dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: result

  template:
    metadata:
      labels:
        app: result

    spec:
      containers:
        - name: result

          image: zeeshankhan001/result:latest

          ports:
            - containerPort: 4000

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: postgres-secret