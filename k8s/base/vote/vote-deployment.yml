apiVersion: apps/v1
kind: Deployment

metadata:
  name: vote
  namespace: voting-dev

spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: vote
  
  template: 
    metadata:
      labels:
        app: vote

    spec:
      containers:
        - name: vote
          image: zeeshankhan001/voting-app:latest
          ports: 
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config