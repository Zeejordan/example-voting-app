apiVersion: apps/v1
kind: Deployment

metadata:
  name: vote
  namespace: voting-dev

spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: vote
  
  template: 
    metadata:
      labels:
        app: vote

    spec:
      containers:
        - name: vote
          image: zeeshankhan001/voting-app:latest
          ports: 
            - containerPort: 80

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          envFrom:
            - configMapRef:
                name: app-config
          
          readinessProbe:
            httpGet:
              path: /health
              port: 80

            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 80

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3